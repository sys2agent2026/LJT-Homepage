bio: |
  Junteng Liu is a first-year PhD candidate at the HKUST NLP Group, where he is advised by Professor Junxian He. His research focuses on natural language processing and machine learning, with specific interests in LLM Reasoning and Reinforcement Learning, Hallucination in Vision-Language Models (VLM), and LLM Truthfulness and Interpretability.
  
  Prior to his PhD, Junteng graduated from Shanghai Jiao Tong University (SJTU) in June 2024 with a B.Eng. degree. He has also held research internships at MINIMAX (February 2025 - Present), Tencent WXG (June 2024 - September 2024), and Shanghai AI Lab (June 2023 - December 2023).
  
  Junteng is the recipient of the Zhiyuan Honor Scholarship from Shanghai Jiao Tong University.

